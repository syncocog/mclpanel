version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mclegends-postgres
    environment:
      POSTGRES_DB: mclegends
      POSTGRES_USER: mclegends
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mclegends_secure_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - mclegends-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mclegends"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mclegends-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_pass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - mclegends-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: mclegends-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-mclegends}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-mclegends_minio_pass}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - mclegends-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mclegends-backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://mclegends:${DB_PASSWORD:-mclegends_secure_pass}@postgres:5432/mclegends
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_pass}
      JWT_SECRET: ${JWT_SECRET:-change_this_jwt_secret_in_production}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_USER:-mclegends}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:-mclegends_minio_pass}
      DAEMON_SECRET: ${DAEMON_SECRET:-daemon_secret_key}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - mclegends-network
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mclegends-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: ws://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - mclegends-network

  daemon:
    build:
      context: ./daemon
      dockerfile: Dockerfile
    container_name: mclegends-daemon
    privileged: true
    environment:
      DAEMON_PORT: 8080
      DAEMON_SECRET: ${DAEMON_SECRET:-daemon_secret_key}
      API_URL: http://backend:4000
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - daemon_servers:/var/lib/mclegends/servers
    networks:
      - mclegends-network
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: mclegends-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - certbot_data:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - mclegends-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  daemon_servers:
  certbot_data:

networks:
  mclegends-network:
    driver: bridge
