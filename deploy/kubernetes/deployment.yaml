apiVersion: v1
kind: Namespace
metadata:
  name: mclegends

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: mclegends
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_DB
          value: mclegends
        - name: POSTGRES_USER
          value: mclegends
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mclegends-secrets
              key: db-password
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: mclegends
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: mclegends/backend:latest
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: mclegends-secrets
              key: database-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: mclegends-secrets
              key: jwt-secret
        ports:
        - containerPort: 4000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: mclegends
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: mclegends/frontend:latest
        env:
        - name: NEXT_PUBLIC_API_URL
          value: https://api.mclegends.gg
        ports:
        - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: mclegends
spec:
  selector:
    app: backend
  ports:
  - port: 4000
    targetPort: 4000
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: mclegends
spec:
  selector:
    app: frontend
  ports:
  - port: 3000
    targetPort: 3000
  type: LoadBalancer
